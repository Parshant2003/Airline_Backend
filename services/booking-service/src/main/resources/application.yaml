server:
  port: 5003
spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:mysql://localhost:3306/airline_booking
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: booking-service-group

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true