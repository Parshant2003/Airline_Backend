server:
  port: 5007

spring:
  application:
    name: pricing-service

  datasource:
    url: jdbc:mysql://localhost:3306/airline_pricing
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true