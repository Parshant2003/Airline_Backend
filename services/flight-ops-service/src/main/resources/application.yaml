server:
  port: 5004

spring:
  application:
    name: flight-ops-service

  datasource:
    url: jdbc:mysql://localhost:3306/airline_flight
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: localhost:9092


eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true