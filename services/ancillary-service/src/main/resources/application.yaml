server:
  port: 5002

spring:
  application:
    name: ancillary-service

  datasource:
    url: jdbc:mysql://localhost:3306/airline_ancillary
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
