    image: "parshantbisht2003/gds-user:1.0.0"
    container_name: gds-user-service
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    # NO PORTS EXPOSED - Internal only
    depends_on:
#      config-server:
#        condition: service_healthy
      service-registry:
        condition: service_healthy
      userdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "user-service"
#      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://userdb:3306/airline_user?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseG1GC"
    restart: unless-stopped


