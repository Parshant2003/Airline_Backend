#   InfraStricture

  service-registry:
    image: "parshantbisht2003/gds-service-registry:1.0.0"
    container_name: gds-eureka-server
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    # NO PORTS EXPOSED - Internal only
#    depends_on:
#      config-server:
#        condition: service_healthy
    environment:
#      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseG1GC"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  api-gateway:
      image: "parshantbisht2003/gds-api-gateway:1.0.0"
      container_name: gds-api-gateway
      mem_limit: 512m
      mem_reservation: 256m
      cpus: 0.5
      ports:
        - "5000:5000"  # ONLY PORT EXPOSED TO THE WORLD
      depends_on:
#        config-server:
#          condition: service_healthy
        service-registry:
          condition: service_healthy
#        redis:
#          condition: service_healthy
      environment:
        SPRING_APPLICATION_NAME: "api-gateway"
        SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
        EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
#        SPRING_DATA_REDIS_HOST: redis
#        SPRING_DATA_REDIS_PORT: 6379
        JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseG1GC"
      restart: unless-stopped

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1.0
    # NO PORTS EXPOSED - Internal only
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092  # Internal service name
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx1g"