services:



#  Databases

#  1 : User database
  userdb:
    image: mysql:8.0
    container_name: userdb
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "3302:3306"  # LOCALHOST ONLY - for debugging if needed
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_user
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s

